<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#player{
    position:fixed;
    top:50%;
    left:50%;
    width:177.77vh;
    height:56.25vw;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}
</style>
</head>

<body>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
function onYouTubeIframeAPIReady(){

    new YT.Player('player',{

        videoId:'kn6-c223DUU',

        playerVars:{
            autoplay:1,
            controls:0,
            mute:1,
            loop:1,
            playlist:'kn6-c223DUU',
            rel:0,
            modestbranding:1,
            playsinline:1
        },

        events:{
            onReady:function(e){
                e.target.mute();
                e.target.playVideo();
            }
        }

    });

}
</script>

</body>
</html>
