<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vídeo de Fundo</title>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    background:#000;
}

#loader{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    opacity:1;
    transition:opacity 3s ease;
}

#loader.hide{
    opacity:0;
    pointer-events:none;
}

#player{
    position:fixed;
    top:50%;
    left:50%;
    width:177.77vh;
    height:56.25vw;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    pointer-events:none;

    opacity:0;
    transition:opacity 2s ease;
}

#player.show{
    opacity:1;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:2;
}

.content{
    position:relative;
    z-index:3;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-family:Arial,sans-serif;
    font-size:42px;
}

</style>

</head>

<body>

<div id="loader"></div>

<div id="player"></div>

<div class="overlay"></div>

<div class="content">
    Seu conteúdo aqui
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player',{

        videoId:'kn6-c223DUU',

        playerVars:{
            autoplay:1,
            controls:0,
            mute:1,
            loop:1,
            playlist:'kn6-c223DUU',
            rel:0,
            modestbranding:1,
            playsinline:1
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }

    });

}

function onPlayerReady(event){

    event.target.mute();
    event.target.playVideo();

}

function onPlayerStateChange(event){

    if(event.data===YT.PlayerState.PLAYING){

        document.getElementById("player").classList.add("show");

        setTimeout(function(){

            document.getElementById("loader").classList.add("hide");

        },400);

    }

}

</script>

</body>
</html>
